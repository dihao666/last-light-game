<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Blink Hunter</title>
  <desc id="desc">A top-down phase assassin with a violet arrowhead silhouette, split mantle, twin crescent blades, and broken magenta teleport rings.</desc>
  <defs>
    <linearGradient id="mantle" x1="53" y1="42" x2="132" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#684BA3"/>
      <stop offset="0.28" stop-color="#352861"/>
      <stop offset="0.64" stop-color="#17152F"/>
      <stop offset="1" stop-color="#060913"/>
    </linearGradient>
    <linearGradient id="armor" x1="66" y1="33" x2="121" y2="126" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A77AE1"/>
      <stop offset="0.22" stop-color="#53397E"/>
      <stop offset="0.66" stop-color="#1E1839"/>
      <stop offset="1" stop-color="#090A17"/>
    </linearGradient>
    <linearGradient id="phaseBlade" x1="28" y1="69" x2="165" y2="139" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FFFF"/>
      <stop offset="0.18" stop-color="#80E9F5"/>
      <stop offset="0.48" stop-color="#A959E7"/>
      <stop offset="0.8" stop-color="#F15ADC"/>
      <stop offset="1" stop-color="#FFF8FF"/>
    </linearGradient>
    <radialGradient id="blinkCore" cx="0" cy="0" r="1" gradientTransform="translate(96 91) rotate(90) scale(33)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.2" stop-color="#E8B8FF"/>
      <stop offset="0.48" stop-color="#B04CE3" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#B04CE3" stop-opacity="0"/>
    </radialGradient>
    <pattern id="phaseGrain" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <path d="M0 3H14M0 11H14" stroke="#F0D7FF" stroke-opacity="0.1"/>
      <path d="M5 0V14" stroke="#02050A" stroke-opacity="0.22" stroke-width="2"/>
    </pattern>
    <filter id="violetGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cyanGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="cloakClip">
      <path d="M96 48C72 47 55 58 49 78L37 110L51 105L43 143L69 131L78 174L96 153L115 174L123 131L150 143L141 105L155 110L143 78C137 58 120 47 96 48Z"/>
    </clipPath>
  </defs>

  <ellipse cx="97" cy="158" rx="68" ry="21" fill="#02050A" fill-opacity="0.72"/>
  <ellipse cx="96" cy="154" rx="50" ry="13" fill="#281B48" fill-opacity="0.4" stroke="#A46DCF" stroke-opacity="0.22" stroke-width="2"/>

  <!-- Broken teleport ring reads even behind the body. -->
  <g fill="none" stroke-linecap="round">
    <path d="M48 55C29 70 21 95 28 117" stroke="#D35BE6" stroke-opacity="0.28" stroke-width="10"/>
    <path d="M144 55C163 70 171 95 164 117" stroke="#58DDEA" stroke-opacity="0.24" stroke-width="10"/>
    <path d="M42 48C27 61 18 78 18 96M150 48C165 61 174 78 174 96" stroke="#03060B" stroke-width="8"/>
    <path d="M42 48C31 58 24 69 21 82M150 48C161 58 168 69 171 82" stroke="url(#phaseBlade)" stroke-width="3.5" filter="url(#violetGlow)"/>
    <path d="M23 109C27 128 40 145 57 154M169 109C165 128 152 145 135 154" stroke="#C756EA" stroke-width="3" stroke-dasharray="10 9" filter="url(#violetGlow)"/>
  </g>
  <g fill="#F8F0FF" filter="url(#violetGlow)">
    <path d="M18 91L23 82L28 91L23 99Z"/>
    <path d="M174 91L169 82L164 91L169 99Z" fill="#D9FFFF"/>
    <circle cx="33" cy="132" r="2.5"/><circle cx="159" cy="132" r="2.5"/>
  </g>

  <!-- Arrowhead cloak and split phase tails. -->
  <path d="M96 48C72 47 55 58 49 78L37 110L51 105L43 143L69 131L78 174L96 153L115 174L123 131L150 143L141 105L155 110L143 78C137 58 120 47 96 48Z" fill="url(#mantle)" stroke="#02050B" stroke-width="7" stroke-linejoin="round"/>
  <g clip-path="url(#cloakClip)">
    <rect x="34" y="43" width="124" height="136" fill="url(#phaseGrain)"/>
    <path d="M43 88C67 75 82 78 96 87C113 98 130 95 149 82V108C130 119 111 119 95 109C77 99 62 101 43 113Z" fill="#BD68EA" fill-opacity="0.17"/>
    <path d="M95 67L65 146M97 67L96 154M99 68L127 147" stroke="#090A17" stroke-width="7" stroke-linecap="round"/>
    <path d="M91 70L67 133M103 70L126 133" stroke="#C8A1F1" stroke-opacity="0.28" stroke-width="2"/>
    <path d="M49 139C68 128 82 132 96 142C111 152 127 145 143 137" stroke="#76EEF2" stroke-opacity="0.17" stroke-width="4"/>
  </g>
  <path d="M45 102L65 87L73 97L53 111Z" fill="#8E62C2" stroke="#02060B" stroke-width="4"/>
  <path d="M147 102L127 87L119 97L139 111Z" fill="#4653A5" stroke="#02060B" stroke-width="4"/>
  <path d="M48 104L63 93M144 104L129 93" stroke="#F6E8FF" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Forward armor and mask. -->
  <path d="M66 67L77 46L96 37L115 46L126 67L116 107L96 123L76 107Z" fill="url(#armor)" stroke="#02050A" stroke-width="7" stroke-linejoin="round"/>
  <path d="M77 53L96 42L115 53L109 77L96 91L83 77Z" fill="#120F27" stroke="#7654A4" stroke-opacity="0.65" stroke-width="3"/>
  <path d="M96 43L85 69L96 84L107 69Z" fill="#060914"/>
  <path d="M79 74C88 68 104 68 113 74L107 87C100 92 91 92 84 87Z" fill="#090916" stroke="#B47BD7" stroke-opacity="0.5" stroke-width="2.5"/>
  <path d="M85 77L95 74L92 83L82 84ZM107 77L97 74L100 83L110 84Z" fill="url(#phaseBlade)" filter="url(#cyanGlow)"/>
  <circle cx="89" cy="79" r="2" fill="#FFFFFF"/><circle cx="103" cy="79" r="2" fill="#FFFFFF"/>
  <path d="M78 51L66 43M114 51L126 43" stroke="#CBA7ED" stroke-opacity="0.62" stroke-width="3" stroke-linecap="round"/>
  <path d="M96 32L88 41L96 46L104 41Z" fill="#E8D5FF" stroke="#02050A" stroke-width="3" filter="url(#violetGlow)"/>

  <!-- Chest phase engine. -->
  <path d="M72 91L96 80L120 91L113 119L96 130L79 119Z" fill="#111126" stroke="#02050A" stroke-width="5"/>
  <circle cx="96" cy="103" r="21" fill="url(#blinkCore)"/>
  <path d="M96 86L108 97L104 113L96 121L84 112L87 97Z" fill="#3C245B" stroke="#D67AF1" stroke-width="3"/>
  <path d="M96 91L103 101L97 115L89 104Z" fill="#F7F3FF" filter="url(#violetGlow)"/>
  <circle cx="96" cy="103" r="4" fill="#FFFFFF"/>
  <path d="M76 111L88 115M116 111L104 115" stroke="#64DDEB" stroke-width="2.5" filter="url(#cyanGlow)"/>

  <!-- Twin hooked phase blades define the melee role. -->
  <path d="M61 82C42 79 25 68 20 51C17 39 22 29 31 22C28 38 37 49 50 53L72 58Z" fill="url(#phaseBlade)" stroke="#02050A" stroke-width="6" stroke-linejoin="round"/>
  <path d="M131 82C150 79 167 68 172 51C175 39 170 29 161 22C164 38 155 49 142 53L120 58Z" fill="url(#phaseBlade)" stroke="#02050A" stroke-width="6" stroke-linejoin="round"/>
  <path d="M30 31C31 48 43 59 63 63M162 31C161 48 149 59 129 63" stroke="#FFFFFF" stroke-opacity="0.74" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M62 58L78 72L69 86L52 72Z" fill="#231A43" stroke="#02050A" stroke-width="4"/>
  <path d="M130 58L114 72L123 86L140 72Z" fill="#231A43" stroke="#02050A" stroke-width="4"/>
  <path d="M57 65L72 77M135 65L120 77" stroke="#E35AE6" stroke-width="3" filter="url(#violetGlow)"/>
  <circle cx="66" cy="74" r="4" fill="#7DE9F3" stroke="#02050A" stroke-width="2"/>
  <circle cx="126" cy="74" r="4" fill="#EF75E8" stroke="#02050A" stroke-width="2"/>

  <!-- Phase scars and afterimage shards. -->
  <g stroke="#D85BE9" stroke-linecap="round" filter="url(#violetGlow)">
    <path d="M61 115L72 110L77 118L84 112" stroke-width="3"/>
    <path d="M131 115L120 110L115 118L108 112" stroke-width="3"/>
    <path d="M77 139L84 132M115 139L108 132" stroke-width="2.5"/>
  </g>
  <g fill="#C9FAFF">
    <path d="M35 119L41 113L46 118L40 123Z"/>
    <path d="M157 119L151 113L146 118L152 123Z" fill="#FFD5FB"/>
    <circle cx="69" cy="157" r="2.2"/><circle cx="123" cy="157" r="2.2" fill="#F3C8FF"/>
  </g>
</svg>
