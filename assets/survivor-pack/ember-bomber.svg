    <path d="M90 72L68 137M104 72L127 137" stroke="#E59862" stroke-opacity="0.25" stroke-width="2"/>
  </g>
  <path d="M69 137L81 150L77 176L58 181L53 166Z" fill="#111116" stroke="#050609" stroke-width="6" stroke-linejoin="round"/>
  <path d="M123 137L111 150L116 176L135 181L140 166Z" fill="#111116" stroke="#050609" stroke-width="6" stroke-linejoin="round"/>
  <path d="M61 170L76 166M131 170L116 166" stroke="#B1744C" stroke-opacity="0.55" stroke-width="3"/>

  <!-- Shoulder bomb drums create a deliberately uneven silhouette. -->
  <path d="M52 54C35 53 24 66 25 84L30 115L49 127L65 114L66 74Z" fill="url(#iron)" stroke="#050609" stroke-width="7"/>
  <path d="M140 58C156 57 168 69 168 86L163 121L144 131L128 115L128 77Z" fill="url(#copper)" stroke="#050609" stroke-width="7"/>
  <path d="M31 76H64M29 95H65M132 80H166M130 102H165" stroke="#E9B27A" stroke-opacity="0.5" stroke-width="3"/>
  <g fill="#E9C18A" stroke="#2A1714" stroke-width="2">
    <circle cx="38" cy="67" r="3"/><circle cx="57" cy="67" r="3"/><circle cx="35" cy="108" r="3"/><circle cx="57" cy="113" r="3"/>
    <circle cx="139" cy="71" r="3"/><circle cx="158" cy="72" r="3"/><circle cx="137" cy="115" r="3"/><circle cx="157" cy="114" r="3"/>
  </g>
  <path d="M38 55C36 43 42 35 51 36C61 36 64 47 60 55" stroke="#271619" stroke-width="8" stroke-linecap="round"/>
  <path d="M38 54C37 45 42 40 49 40C56 40 59 46 58 54" stroke="#E06C32" stroke-width="3" stroke-linecap="round"/>
  <path d="M148 59C151 47 147 39 138 35C130 31 124 39 128 49" stroke="#251518" stroke-width="8" stroke-linecap="round"/>
  <path d="M148 58C150 49 146 43 139 40C133 37 129 42 130 49" stroke="#F0A63B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="39" r="5" fill="#FFF3A4" filter="url(#emberGlow)"/>
  <path d="M135 36L139 26L143 37L139 45Z" fill="#FFF09A" filter="url(#emberGlow)"/>

  <!-- Helmet, blast goggles, and vent stack. -->
  <path d="M96 28C77 28 63 43 64 62L73 83L96 94L119 83L128 62C128 43 115 28 96 28Z" fill="url(#iron)" stroke="#050609" stroke-width="7"/>
  <path d="M76 42L82 25L96 19L111 25L117 42" fill="#343136" stroke="#050609" stroke-width="6" stroke-linejoin="round"/>
  <path d="M87 28L87 14H104V28" fill="#2B292C" stroke="#050609" stroke-width="5"/>
  <path d="M89 15H102M89 20H102" stroke="#C07A4B" stroke-width="2.5"/>
  <path d="M72 55C82 48 110 48 120 55L116 72C106 80 85 80 75 72Z" fill="#0A0B0F" stroke="#7C5C4D" stroke-width="3"/>
  <path d="M76 57L92 54L91 68L77 69ZM116 57L100 54L101 68L115 69Z" fill="#E45E2D" filter="url(#emberGlow)"/>
  <circle cx="85" cy="61" r="3" fill="#FFF4B6"/><circle cx="107" cy="61" r="3" fill="#FFF4B6"/>
  <path d="M91 76L96 80L101 76" stroke="#B77C58" stroke-width="2"/>

  <!-- Furnace core and pressure frame. -->
  <path d="M66 91L78 78H114L127 91L122 130L96 145L70 130Z" fill="#151318" stroke="#050609" stroke-width="6"/>
  <path d="M72 94H120M76 84L70 129M116 84L122 129" stroke="url(#copper)" stroke-width="6"/>
  <circle cx="96" cy="112" r="28" fill="#2C1718" stroke="#09070A" stroke-width="5"/>
  <circle cx="96" cy="112" r="21" fill="url(#furnace)" filter="url(#emberGlow)"/>
  <path d="M82 117C86 106 91 103 96 94C98 104 110 105 109 117C108 126 102 132 95 132C87 132 80 126 82 117Z" fill="#FFF0A0"/>
  <path d="M90 120C91 114 96 110 98 104C101 111 105 115 103 122C102 126 99 128 96 128C92 128 89 125 90 120Z" fill="#FFFFFF"/>
  <path d="M77 106H83M109 106H115M77 119H83M109 119H115" stroke="#2A0D0C" stroke-width="3"/>
  <circle cx="96" cy="112" r="4" fill="#FFFFFF"/>

  <!-- Bomb cradle, hands, and wired detonator. -->
  <path d="M54 103L41 115L49 130L66 118Z" fill="#3F2925" stroke="#050609" stroke-width="5"/>
  <path d="M138 103L151 115L143 130L126 118Z" fill="#3F2925" stroke="#050609" stroke-width="5"/>
  <circle cx="54" cy="119" r="8" fill="#A44B2B" stroke="#351513" stroke-width="3"/>
  <circle cx="138" cy="119" r="8" fill="#A44B2B" stroke="#351513" stroke-width="3"/>
  <path d="M56 123C66 135 80 138 96 138C113 138 127 134 137 123" stroke="#111014" stroke-width="9" stroke-linecap="round"/>
  <path d="M57 121C69 131 81 134 96 134C112 134 124 131 136 121" stroke="#C46B36" stroke-width="3" stroke-linecap="round"/>
  <path d="M78 140L88 132H105L115 140L108 152H84Z" fill="#202027" stroke="#050609" stroke-width="4"/>
  <path d="M87 139H105M91 145H101" stroke="#F7A53D" stroke-width="2.5" filter="url(#sparkGlow)"/>

  <!-- Heat cracks and cinders. -->
  <g stroke="#F46A2C" stroke-linecap="round" filter="url(#sparkGlow)">
    <path d="M63 130L71 124L77 131L84 126" stroke-width="3"/>
    <path d="M129 130L121 124L115 131L108 126" stroke-width="3"/>
    <path d="M77 153L84 146M115 153L108 146" stroke-width="2.5"/>
  </g>
  <g fill="#FFF0A3">
    <circle cx="22" cy="102" r="2.5"/><circle cx="174" cy="111" r="2.5"/>
    <path d="M69 165L73 159L77 165L73 170ZM123 165L119 159L115 165L119 170Z"/>
  </g>
</svg>
