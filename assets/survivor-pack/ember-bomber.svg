<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Ember Bomber</title>
  <desc id="desc">A top-down demolition brute with a squat furnace shell, asymmetrical bomb drums, glowing fuses, blast goggles, and a volatile ember core.</desc>
  <defs>
    <linearGradient id="coat" x1="46" y1="43" x2="139" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7D3B30"/>
      <stop offset="0.28" stop-color="#512522"/>
      <stop offset="0.65" stop-color="#271519"/>
      <stop offset="1" stop-color="#0B0B10"/>
    </linearGradient>
    <linearGradient id="iron" x1="41" y1="37" x2="155" y2="157" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8A7764"/>
      <stop offset="0.2" stop-color="#4F4540"/>
      <stop offset="0.56" stop-color="#24252A"/>
      <stop offset="0.82" stop-color="#101217"/>
      <stop offset="1" stop-color="#665249"/>
    </linearGradient>
    <linearGradient id="copper" x1="46" y1="42" x2="141" y2="153" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD17A"/>
      <stop offset="0.2" stop-color="#D67835"/>
      <stop offset="0.52" stop-color="#8B3B27"/>
      <stop offset="0.78" stop-color="#3B1B1B"/>
      <stop offset="1" stop-color="#C76431"/>
    </linearGradient>
    <radialGradient id="furnace" cx="0" cy="0" r="1" gradientTransform="translate(96 112) rotate(90) scale(34)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.12" stop-color="#FFF0A3"/>
      <stop offset="0.32" stop-color="#FFB52E"/>
      <stop offset="0.58" stop-color="#F04A25"/>
      <stop offset="1" stop-color="#54161B"/>
    </radialGradient>
    <radialGradient id="spark" cx="0" cy="0" r="1" gradientTransform="translate(0 0) rotate(90) scale(1)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.28" stop-color="#FFE27A"/>
      <stop offset="1" stop-color="#F05A25" stop-opacity="0"/>
    </radialGradient>
    <pattern id="soot" width="17" height="17" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="2" fill="#050609" fill-opacity="0.2"/>
      <circle cx="13" cy="12" r="1.5" fill="#F2B16D" fill-opacity="0.08"/>
      <path d="M1 15L7 12M11 4L16 1" stroke="#020305" stroke-opacity="0.16" stroke-width="2"/>
    </pattern>
    <filter id="emberGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="coatClip">
      <path d="M96 49C68 47 46 62 40 88L32 119L46 144L69 136L77 174L96 158L116 174L124 136L148 145L160 119L152 87C145 61 124 47 96 49Z"/>
    </clipPath>
  </defs>

  <ellipse cx="97" cy="158" rx="73" ry="23" fill="#030406" fill-opacity="0.76"/>
  <ellipse cx="96" cy="153" rx="55" ry="14" fill="#4A211B" fill-opacity="0.44" stroke="#D77B45" stroke-opacity="0.2" stroke-width="2"/>

  <!-- Blast warning halo and loose sparks. -->
  <circle cx="96" cy="103" r="76" stroke="#F0642D" stroke-opacity="0.13" stroke-width="10" stroke-dasharray="27 18"/>
  <circle cx="96" cy="103" r="68" stroke="#FFB23B" stroke-opacity="0.28" stroke-width="2.5" stroke-dasharray="5 13"/>
  <g fill="#FFD96B" filter="url(#sparkGlow)">
    <path d="M25 83L30 74L34 84L30 91Z"/>
    <path d="M161 82L166 73L170 83L166 90Z"/>
    <path d="M39 137L44 129L48 138L43 144Z"/>
    <circle cx="151" cy="137" r="3"/><circle cx="31" cy="109" r="2.5"/>
  </g>

  <!-- Squat fireproof coat and weighted boots. -->
  <path d="M96 49C68 47 46 62 40 88L32 119L46 144L69 136L77 174L96 158L116 174L124 136L148 145L160 119L152 87C145 61 124 47 96 49Z" fill="url(#coat)" stroke="#050609" stroke-width="8" stroke-linejoin="round"/>
  <g clip-path="url(#coatClip)">
    <rect x="27" y="43" width="138" height="136" fill="url(#soot)"/>
    <path d="M35 95C58 82 76 84 96 95C118 107 138 104 157 91V117C135 129 116 129 96 118C75 107 56 110 35 123Z" fill="#D86538" fill-opacity="0.17"/>
