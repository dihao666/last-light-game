<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Void Scribe</title>
  <desc id="desc">A coral-robed void warlock inscribing cyan rift-light through a faceted cross prism.</desc>
  <defs>
    <linearGradient id="scribeRobe" x1="28" y1="22" x2="66" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8580"/>
      <stop offset="0.28" stop-color="#C7475B"/>
      <stop offset="0.62" stop-color="#54203B"/>
      <stop offset="1" stop-color="#090B1B"/>
    </linearGradient>
    <linearGradient id="hood" x1="38" y1="14" x2="58" y2="49" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF9A8B"/>
      <stop offset="0.34" stop-color="#E25064"/>
      <stop offset="0.78" stop-color="#501D3B"/>
      <stop offset="1" stop-color="#101020"/>
    </linearGradient>
    <linearGradient id="crossPrism" x1="29" y1="37" x2="68" y2="67" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FFFF"/>
      <stop offset="0.2" stop-color="#62EEF0"/>
      <stop offset="0.5" stop-color="#46A9D7"/>
      <stop offset="0.72" stop-color="#FF7F79"/>
      <stop offset="1" stop-color="#FFE1D0"/>
    </linearGradient>
    <radialGradient id="riftGlow" cx="0" cy="0" r="1" gradientTransform="translate(48 52) rotate(90) scale(26)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.2" stop-color="#8EFFFF"/>
      <stop offset="0.55" stop-color="#48D8E4" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#48D8E4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scribeMarks" width="9" height="9" patternUnits="userSpaceOnUse">
      <path d="M1 7L4 3L7 6M3 8L6 4" stroke="#FFD5CD" stroke-opacity="0.09" stroke-width="0.8"/>
    </pattern>
    <filter id="riftLight" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coralGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="robeClip">
      <path d="M48 22L60 28L64 40L76 50L69 62L77 84L59 79L54 92L48 82L42 92L37 79L19 84L27 62L20 50L32 40L36 28Z"/>
    </clipPath>
  </defs>

  <ellipse cx="48" cy="84" rx="36" ry="9" fill="#010409" fill-opacity="0.8"/>
  <path d="M48 8L45 24L48 31L52 42L48 52L54 63L51 84" stroke="#56E8EC" stroke-opacity="0.26" stroke-width="7" stroke-linejoin="bevel"/>
  <path d="M48 8L45 24L48 31L52 42L48 52L54 63L51 84" stroke="#9BFFFF" stroke-opacity="0.7" stroke-width="1.7" filter="url(#riftLight)"/>
  <path d="M46 28L29 18L18 21M51 42L72 30L84 33M47 55L23 66L11 62M53 63L74 75L87 72" stroke="#51DCE5" stroke-opacity="0.45" stroke-width="1.5" stroke-linecap="square" filter="url(#riftLight)"/>
  <path d="M30 18L25 12M72 30L79 23M23 66L16 72M74 75L80 83" stroke="#FF6F71" stroke-opacity="0.55" stroke-width="2"/>

  <!-- Jagged coral robes frame the caster and retain the dark outlined pack style. -->
  <path d="M48 22L60 28L64 40L76 50L69 62L77 84L59 79L54 92L48 82L42 92L37 79L19 84L27 62L20 50L32 40L36 28Z" fill="url(#scribeRobe)" stroke="#02050B" stroke-width="4" stroke-linejoin="round"/>
  <g clip-path="url(#robeClip)">
    <rect x="17" y="20" width="62" height="74" fill="url(#scribeMarks)"/>
    <path d="M20 52L48 39L76 52L69 63L48 54L27 64Z" fill="#FF796F" fill-opacity="0.2"/>
    <path d="M47 28L38 83M49 28L48 85M51 28L59 82" stroke="#0A0A1A" stroke-width="4" stroke-linecap="round"/>
    <path d="M31 44L40 51L36 61L43 66M65 44L56 51L61 59L55 67" stroke="#FFAAA0" stroke-opacity="0.3" stroke-width="1.5"/>
  </g>
  <path d="M24 48L36 42L41 52L30 62L20 57Z" fill="#8F304B" stroke="#02050B" stroke-width="3" stroke-linejoin="round"/>
  <path d="M72 48L60 42L55 52L66 62L76 57Z" fill="#8F304B" stroke="#02050B" stroke-width="3" stroke-linejoin="round"/>

  <!-- The hood is split by the same living cyan rift. -->
  <path d="M48 13L59 24L56 42L48 49L40 42L37 24Z" fill="url(#hood)" stroke="#02050B" stroke-width="4" stroke-linejoin="round"/>
  <path d="M48 18L55 27L53 38L48 43L43 38L41 27Z" fill="#070A16" stroke="#F27A79" stroke-opacity="0.6" stroke-width="1.5"/>
  <path d="M47 19L44 29L48 33L45 41" stroke="#79F2F1" stroke-width="2" stroke-linecap="square" filter="url(#riftLight)"/>
  <path d="M43 31L47 29L46 35L41 36ZM53 31L49 29L50 35L55 36Z" fill="#72F0F0" filter="url(#riftLight)"/>
  <path d="M48 9L43 16L48 19L53 16Z" fill="#FF8A80" stroke="#02050B" stroke-width="2" filter="url(#coralGlow)"/>

  <!-- A literal faceted cross prism is the scribe's floating focus. -->
  <circle cx="48" cy="54" r="22" fill="url(#riftGlow)"/>
  <path d="M43 34H53V47H66V57H53V70H43V57H30V47H43Z" fill="#08121D" stroke="#02050B" stroke-width="3.5" stroke-linejoin="bevel"/>
  <path d="M47 37H50L52 49H63V52L51 54L50 67H47L45 55L33 53V50L45 48Z" fill="url(#crossPrism)" filter="url(#riftLight)"/>
  <path d="M48 37V67M33 52H63" stroke="#F8FFFF" stroke-opacity="0.78" stroke-width="1.2"/>
  <path d="M48 37L52 49L48 52L44 48ZM63 52L51 55L48 52L52 49ZM48 67L44 55L48 52L52 55ZM33 52L45 48L48 52L44 55Z" fill="url(#crossPrism)" fill-opacity="0.82" stroke="#B8FFFF" stroke-opacity="0.55" stroke-width="0.8"/>
  <path d="M48 47L53 52L48 57L43 52Z" fill="#FFFFFF" stroke="#5CE5EA" stroke-width="1.2" filter="url(#riftLight)"/>

  <!-- Open hands, glyph cuts, and a light-quill sell the scribe role. -->
  <path d="M25 58L18 62L13 59L16 65L12 69L19 68L23 72L24 65L30 61Z" fill="#EA5867" stroke="#02050B" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M71 58L78 62L83 59L80 65L84 69L77 68L73 72L72 65L66 61Z" fill="#EA5867" stroke="#02050B" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M18 64L22 64M78 64L74 64" stroke="#B7FFFF" stroke-width="1.7" filter="url(#riftLight)"/>
  <path d="M78 57L88 42L86 56L80 68Z" fill="#6CECEF" stroke="#02050B" stroke-width="2" stroke-linejoin="round"/>
  <path d="M80 59L86 49" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="1.2"/>
  <path d="M30 72L36 69L39 74M66 72L60 69L57 74M44 80L48 76L52 80" stroke="#62E5E9" stroke-width="1.5" stroke-linecap="square" filter="url(#riftLight)"/>
  <g fill="#E8FFFF" filter="url(#riftLight)">
    <path d="M12 37L16 33L19 37L15 41Z"/>
    <path d="M84 37L80 33L77 37L81 41Z" fill="#FF9188"/>
    <path d="M13 78L17 75L20 79L16 82Z" fill="#FF7775"/>
    <path d="M83 78L79 75L76 79L80 82Z"/>
  </g>
</svg>
