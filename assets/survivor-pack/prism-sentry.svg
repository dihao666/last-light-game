<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Prism Sentry</title>
  <desc id="desc">A top-down three-legged optical sentry with an obsidian chassis, gold gimbals, a rotating triangular prism, and distinct cyan, magenta, and amber beam ports.</desc>
  <defs>
    <linearGradient id="chassis" x1="48" y1="42" x2="143" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#50616A"/>
      <stop offset="0.22" stop-color="#29353E"/>
      <stop offset="0.58" stop-color="#111820"/>
      <stop offset="1" stop-color="#05080E"/>
    </linearGradient>
    <linearGradient id="gold" x1="53" y1="45" x2="139" y2="152" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0A6"/>
      <stop offset="0.2" stop-color="#D6A94E"/>
      <stop offset="0.5" stop-color="#846026"/>
      <stop offset="0.76" stop-color="#302619"/>
      <stop offset="1" stop-color="#C99A42"/>
    </linearGradient>
    <linearGradient id="prism" x1="74" y1="66" x2="119" y2="125" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FFFF"/>
      <stop offset="0.2" stop-color="#7EE9EF"/>
      <stop offset="0.46" stop-color="#CF7BEF"/>
      <stop offset="0.72" stop-color="#FF7D8E"/>
      <stop offset="1" stop-color="#FFD875"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientTransform="translate(96 99) rotate(90) scale(41)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.18" stop-color="#D6FFFF"/>
      <stop offset="0.44" stop-color="#8FBCF3" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#8FBCF3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamCyan" x1="95" y1="79" x2="95" y2="7" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFFFFF"/>
      <stop offset="0.35" stop-color="#54E5EC"/>
      <stop offset="1" stop-color="#54E5EC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamMagenta" x1="77" y1="107" x2="18" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0FF"/>
      <stop offset="0.35" stop-color="#EA5BCB"/>
      <stop offset="1" stop-color="#EA5BCB" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamAmber" x1="116" y1="108" x2="175" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8DA"/>
      <stop offset="0.35" stop-color="#FFB949"/>
      <stop offset="1" stop-color="#FFB949" stop-opacity="0"/>
    </linearGradient>
    <pattern id="machineGrain" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 4H16M0 12H16" stroke="#C9E5E5" stroke-opacity="0.07"/>
      <circle cx="4" cy="8" r="1" fill="#FFFFFF" fill-opacity="0.12"/>
      <circle cx="12" cy="2" r="1" fill="#020306" fill-opacity="0.35"/>
    </pattern>
    <filter id="prismGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="smallGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="96" cy="157" rx="75" ry="22" fill="#010407" fill-opacity="0.76"/>
  <path d="M96 143L151 158L128 174H64L41 158Z" fill="#17212A" fill-opacity="0.5" stroke="#7D9297" stroke-opacity="0.18" stroke-width="2"/>

  <!-- Three restrained targeting beams announce the optical mechanic. -->
  <path d="M89 77L82 8L108 8L102 77Z" fill="url(#beamCyan)" fill-opacity="0.16"/>
  <path d="M77 105L16 130L29 153L84 116Z" fill="url(#beamMagenta)" fill-opacity="0.15"/>
  <path d="M115 105L176 130L163 153L108 116Z" fill="url(#beamAmber)" fill-opacity="0.15"/>
  <path d="M95 72V14" stroke="#7AF3F4" stroke-opacity="0.38" stroke-width="3" stroke-dasharray="8 7"/>
  <path d="M78 111L29 141" stroke="#EC68D6" stroke-opacity="0.38" stroke-width="3" stroke-dasharray="8 7"/>
  <path d="M114 111L163 141" stroke="#FFBF55" stroke-opacity="0.38" stroke-width="3" stroke-dasharray="8 7"/>

  <!-- Three articulated feet make a stable geometric silhouette. -->
  <g fill="url(#chassis)" stroke="#020509" stroke-width="7" stroke-linejoin="round">
    <path d="M82 121L65 132L48 159L24 166L30 178L64 174L88 144Z"/>
    <path d="M110 121L127 132L144 159L168 166L162 178L128 174L104 144Z"/>
    <path d="M96 128L113 154L108 181H84L79 154Z"/>
  </g>
  <g fill="#24333C" stroke="#788A8F" stroke-opacity="0.58" stroke-width="2.5">
    <path d="M33 163L57 157L62 168L35 173Z"/>
    <path d="M159 163L135 157L130 168L157 173Z"/>
    <path d="M87 160H105L103 176H89Z"/>
  </g>
  <path d="M50 157L73 132M142 157L119 132M96 138V174" stroke="url(#gold)" stroke-width="5"/>
  <g fill="#F2D88D" stroke="#21180F" stroke-width="2">
    <circle cx="66" cy="143" r="4"/><circle cx="126" cy="143" r="4"/><circle cx="96" cy="156" r="4"/>
  </g>

  <!-- Hexagonal base and rotating gold gimbal. -->
  <path d="M57 83L78 60H114L136 83L129 129L96 149L63 129Z" fill="url(#chassis)" stroke="#020509" stroke-width="8" stroke-linejoin="round"/>
  <path d="M61 86L80 66H112L132 86L125 125L96 142L67 125Z" fill="url(#machineGrain)"/>
  <path d="M67 84L79 70M125 84L113 70M66 126L82 134M126 126L110 134" stroke="#A9C4C5" stroke-opacity="0.36" stroke-width="3" stroke-linecap="round"/>
  <path d="M76 72C91 61 111 64 123 77M130 94C133 111 122 127 108 134M84 134C69 128 60 113 63 96" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
  <path d="M77 72C90 64 108 65 120 76M127 95C129 108 121 122 109 129M83 130C71 124 65 112 66 98" stroke="#FFF0A8" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <g fill="#F7DA82" stroke="#20170F" stroke-width="2">
    <circle cx="76" cy="72" r="5"/><circle cx="130" cy="94" r="5"/><circle cx="84" cy="134" r="5"/>
  </g>

  <!-- Three emitter arms terminate in unmistakable colored ports. -->
  <path d="M83 78L84 37L95 18L107 37L108 78Z" fill="#1B2730" stroke="#020509" stroke-width="6" stroke-linejoin="round"/>
  <path d="M93 69V29" stroke="#6BE8EB" stroke-width="3" filter="url(#smallGlow)"/>
  <path d="M86 43H105L102 31H89Z" fill="#2D414A" stroke="#020509" stroke-width="3"/>
  <circle cx="95" cy="22" r="7" fill="#6EEAF0" stroke="#EFFFFF" stroke-width="2" filter="url(#prismGlow)"/>
  <path d="M77 101L40 118L18 116L29 134L50 135L83 116Z" fill="#1B2730" stroke="#020509" stroke-width="6" stroke-linejoin="round"/>
  <path d="M71 108L32 126" stroke="#EA66D2" stroke-width="3" filter="url(#smallGlow)"/>
  <path d="M45 116L53 133L38 136L29 119Z" fill="#303840" stroke="#020509" stroke-width="3"/>
  <circle cx="24" cy="125" r="7" fill="#EA66D2" stroke="#FFF0FD" stroke-width="2" filter="url(#prismGlow)"/>
  <path d="M115 101L152 118L174 116L163 134L142 135L109 116Z" fill="#1B2730" stroke="#020509" stroke-width="6" stroke-linejoin="round"/>
  <path d="M121 108L160 126" stroke="#FFBD50" stroke-width="3" filter="url(#smallGlow)"/>
  <path d="M147 116L139 133L154 136L163 119Z" fill="#303840" stroke="#020509" stroke-width="3"/>
  <circle cx="168" cy="125" r="7" fill="#FFBD50" stroke="#FFF8DC" stroke-width="2" filter="url(#prismGlow)"/>

  <!-- Central prism, split into three functional faces. -->
  <circle cx="96" cy="99" r="41" fill="url(#coreGlow)"/>
  <path d="M96 61L132 122H60Z" fill="#071018" stroke="#020509" stroke-width="7" stroke-linejoin="round"/>
  <path d="M96 69L96 111L67 117Z" fill="#55DCE7" fill-opacity="0.82"/>
  <path d="M96 69L125 117L96 111Z" fill="#E45CC8" fill-opacity="0.82"/>
  <path d="M67 117L96 111L125 117Z" fill="#FFBF50" fill-opacity="0.88"/>
  <path d="M96 69L96 111M96 111L67 117M96 111L125 117" stroke="#F7FFFF" stroke-opacity="0.82" stroke-width="2.5"/>
  <path d="M96 78L111 105L81 105Z" fill="url(#prism)" stroke="#FFFFFF" stroke-width="2" filter="url(#prismGlow)"/>
  <circle cx="96" cy="99" r="5" fill="#FFFFFF"/>
  <path d="M75 121L96 128L117 121" stroke="url(#gold)" stroke-width="4"/>

  <!-- Calibration marks, lenses, and status sparks. -->
  <g fill="#101820" stroke="#A3B7B8" stroke-opacity="0.6" stroke-width="2">
    <circle cx="69" cy="91" r="5"/><circle cx="123" cy="91" r="5"/>
    <circle cx="76" cy="125" r="4"/><circle cx="116" cy="125" r="4"/>
  </g>
  <g fill="#FFFFFF" filter="url(#smallGlow)">
    <circle cx="69" cy="90" r="2" fill="#77EDF0"/><circle cx="123" cy="90" r="2" fill="#F27AD7"/>
    <circle cx="76" cy="124" r="2" fill="#FFC55A"/><circle cx="116" cy="124" r="2" fill="#77EDF0"/>
  </g>
  <path d="M52 146L58 142M140 146L134 142M92 172H100" stroke="#D7ECED" stroke-opacity="0.48" stroke-width="2.5" stroke-linecap="round"/>
</svg>
