    </clipPath>
    <clipPath id="glassClip">
      <path d="M110 71L210 71L218 122L205 138H115L102 122Z"/>
    </clipPath>
  </defs>

  <ellipse cx="162" cy="286" rx="137" ry="30" fill="#010607" fill-opacity="0.76"/>
