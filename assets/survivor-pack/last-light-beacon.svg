  <ellipse cx="160" cy="146" rx="76" ry="24" fill="#010708" fill-opacity="0.62"/>
  <path d="M87 133L101 121H219L233 133L225 152H95Z" fill="#14383A" stroke="#010708" stroke-width="8" stroke-linejoin="round"/>
  <path d="M94 133H226M102 122L96 149M218 122L224 149" stroke="#9ABCB8" stroke-opacity="0.65" stroke-width="3"/>
  <path d="M78 133H242M83 142H237" stroke="#DDF8F4" stroke-opacity="0.42" stroke-width="3" stroke-linecap="round"/>
  <g fill="#0B292B" stroke="#010708" stroke-width="3">
