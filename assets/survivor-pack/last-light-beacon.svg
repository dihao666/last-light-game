  <path d="M120 76L116 126M140 74L139 132M159 73V135M180 74L181 132M200 76L205 126" stroke="#F6FFEA" stroke-opacity="0.68" stroke-width="2"/>
  <path d="M103 101H217" stroke="#271A14" stroke-width="7"/>
  <path d="M105 99H215" stroke="#D4A453" stroke-width="3"/>
  <path d="M146 126L148 93L156 81H164L172 93L174 126Z" fill="#F7C35F" stroke="#3B2818" stroke-width="5" filter="url(#warmGlow)"/>
  <path d="M153 123L154 96L160 86L166 96L167 123Z" fill="#FFFDE9"/>
  <path d="M150 103H170M151 113H169" stroke="#E69A3D" stroke-width="2"/>
  <circle cx="160" cy="104" r="8" fill="#FFFFFF"/>
  <path d="M139 106L160 92L181 106L160 120Z" fill="#FFF7C7" fill-opacity="0.44" stroke="#FFFDEB" stroke-width="2"/>

  <!-- Crown roof, ribs, wind vane, and compact beams. -->
  <path d="M96 74L117 38L160 16L203 38L224 74L207 84H113Z" fill="url(#roof)" stroke="#010708" stroke-width="9" stroke-linejoin="round"/>
  <path d="M106 70L124 44L160 27L196 44L214 70L203 75H117Z" fill="#6F2B2B"/>
  <path d="M124 44L116 72M143 34L139 75M160 27V76M177 34L181 75M196 44L204 72" stroke="#FFB08D" stroke-opacity="0.58" stroke-width="3"/>
  <path d="M104 72C129 80 190 80 216 72" stroke="#F5BE65" stroke-width="4" filter="url(#softGlow)"/>
  <path d="M160 18V6" stroke="#E9FDF8" stroke-width="4" stroke-linecap="round"/>
  <path d="M145 13H179M160 7L150 13L160 18L170 13Z" fill="#D7A655" stroke="#010708" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="160" cy="7" r="3" fill="#FFFCE3"/>
