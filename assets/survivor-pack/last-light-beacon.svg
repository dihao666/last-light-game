  <path d="M140 233C140 222 148 216 160 216C172 216 180 222 180 233V276H140Z" fill="#0C2D30"/>
  <path d="M144 232H176M144 246H176M144 260H176M160 216V277" stroke="#A8D1CC" stroke-opacity="0.22" stroke-width="2"/>
  <path d="M173 241L180 244L177 251L171 248Z" fill="#FFD881" filter="url(#softGlow)"/>
