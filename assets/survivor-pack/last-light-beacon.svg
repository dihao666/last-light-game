<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">The Last Light Beacon</title>
  <desc id="desc">An ornate top-down harbor beacon with an octagonal seawall, salt-dark stone, aged brass braces, layered galleries, and a brilliant last-light lens.</desc>
  <defs>
    <linearGradient id="stone" x1="96" y1="104" x2="218" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#477978"/>
      <stop offset="0.25" stop-color="#204B4D"/>
      <stop offset="0.62" stop-color="#0A292C"/>
      <stop offset="1" stop-color="#020E11"/>
    </linearGradient>
    <linearGradient id="wetStone" x1="65" y1="238" x2="259" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#31595A"/>
      <stop offset="0.42" stop-color="#122F32"/>
      <stop offset="1" stop-color="#061719"/>
    </linearGradient>
    <linearGradient id="brass" x1="90" y1="52" x2="225" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0AE"/>
      <stop offset="0.2" stop-color="#C99648"/>
      <stop offset="0.48" stop-color="#765126"/>
      <stop offset="0.76" stop-color="#2D2118"/>
      <stop offset="1" stop-color="#D0A458"/>
    </linearGradient>
    <linearGradient id="roof" x1="102" y1="19" x2="214" y2="83" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E98269"/>
      <stop offset="0.34" stop-color="#A9453E"/>
      <stop offset="0.74" stop-color="#542127"/>
      <stop offset="1" stop-color="#210F17"/>
    </linearGradient>
    <linearGradient id="glass" x1="108" y1="72" x2="210" y2="139" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FFF4" stop-opacity="0.9"/>
      <stop offset="0.25" stop-color="#FFDEA0" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#6D9D94" stop-opacity="0.34"/>
      <stop offset="0.82" stop-color="#153B3D" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#FFF1C4" stop-opacity="0.62"/>
    </linearGradient>
    <radialGradient id="light" cx="0" cy="0" r="1" gradientTransform="translate(160 108) rotate(90) scale(56 68)">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.12" stop-color="#FFFDE6"/>
      <stop offset="0.3" stop-color="#FFE38C"/>
      <stop offset="0.58" stop-color="#F6A84E" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#F6A84E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="baseLight" cx="0" cy="0" r="1" gradientTransform="translate(160 271) rotate(90) scale(34 105)">
      <stop stop-color="#78C6BC" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#78C6BC" stop-opacity="0"/>
    </radialGradient>
    <pattern id="masonry" width="46" height="30" patternUnits="userSpaceOnUse">
      <path d="M0 2H46M0 29H46M23 2V15M0 15H46M10 15V29M38 15V29" stroke="#BCE2DD" stroke-opacity="0.13" stroke-width="1.6"/>
      <path d="M0 5H46M0 18H46" stroke="#01090B" stroke-opacity="0.24" stroke-width="3"/>
    </pattern>
    <pattern id="salt" width="33" height="33" patternUnits="userSpaceOnUse">
      <path d="M4 9L10 6L14 10L8 13ZM22 24L27 21L31 25L25 28Z" fill="#E7FFFB" fill-opacity="0.13"/>
      <circle cx="24" cy="7" r="1.7" fill="#F3FFFD" fill-opacity="0.2"/>
      <circle cx="9" cy="25" r="1.2" fill="#F3FFFD" fill-opacity="0.16"/>
    </pattern>
    <filter id="warmGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="towerClip">
