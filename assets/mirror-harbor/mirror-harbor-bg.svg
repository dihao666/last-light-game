      <stop offset="0.45" stop-color="#132F31" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#071416" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="coralGlow" cx="0" cy="0" r="1" gradientTransform="translate(0 0) rotate(90) scale(1)">
      <stop stop-color="#FFB4A8"/>
      <stop offset="0.26" stop-color="#F25F56" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F25F56" stop-opacity="0"/>
    </radialGradient>
    <pattern id="waterLines" width="116" height="62" patternUnits="userSpaceOnUse">
      <path d="M-18 15C3 3 32 6 48 16C69 29 94 28 132 8" stroke="#9FE7E2" stroke-opacity="0.11" stroke-width="2"/>
      <path d="M-10 43C20 34 39 48 63 45C83 43 102 31 126 34" stroke="#D7FFFF" stroke-opacity="0.07" stroke-width="1.5"/>
