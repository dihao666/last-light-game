<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Mirror Harbor battleground</title>
  <desc id="desc">A top-down dark fantasy harbor of ink teal water, salt-scored stone, coral warning lights, and cold white tidal reflections.</desc>
  <defs>
    <linearGradient id="water" x1="116" y1="20" x2="1182" y2="705" gradientUnits="userSpaceOnUse">
      <stop stop-color="#031013"/>
      <stop offset="0.46" stop-color="#08282C"/>
      <stop offset="1" stop-color="#020B0E"/>
    </linearGradient>
    <radialGradient id="deepPool" cx="0" cy="0" r="1" gradientTransform="translate(638 362) rotate(90) scale(356 598)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#123A3C" stop-opacity="0.78"/>
      <stop offset="0.56" stop-color="#071A1D" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#020A0C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="quay" x1="156" y1="91" x2="1101" y2="677" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17373A"/>
      <stop offset="0.38" stop-color="#0C2528"/>
      <stop offset="0.72" stop-color="#123033"/>
      <stop offset="1" stop-color="#071719"/>
    </linearGradient>
    <linearGradient id="wetStone" x1="640" y1="128" x2="640" y2="662" gradientUnits="userSpaceOnUse">
